<ng-container *ngIf="shellVisible; else authLayout">
  <div class="ims-shell">
    <!-- TOP NAV -->
    <nav class="ims-topnav">
      <div class="ims-topnav-inner">
        <div class="ims-topnav-left">
          <button class="ims-hamburger" (click)="mobileMenuOpen = !mobileMenuOpen">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>
          
          <a class="ims-logo" routerLink="/dashboard">
            <span class="ims-logo-icon">⬡</span>
            <span class="ims-logo-text">IMS</span>
          </a>
          
          <div class="ims-nav-links" [class.open]="mobileMenuOpen">
            <a class="ims-nav-link" routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" *appHasRole="['ADMIN', 'STAFF', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER']">Dashboard</a>
            <a class="ims-nav-link" routerLink="/product" routerLinkActive="active" *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER', 'STAFF']">Products</a>
            <a class="ims-nav-link" routerLink="/transaction" routerLinkActive="active" *appHasRole="['ADMIN', 'STAFF', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER']">Transactions</a>
            <div class="ims-nav-divider"></div>
            <a class="ims-nav-link" routerLink="/purchase-orders" routerLinkActive="active" *appHasRole="['ADMIN', 'PROCUREMENT_OFFICER', 'WAREHOUSE_MANAGER']">Orders</a>
            <a class="ims-nav-link" routerLink="/suppliers" routerLinkActive="active" *appHasRole="['ADMIN', 'PROCUREMENT_OFFICER']">Suppliers</a>
            <a class="ims-nav-link" routerLink="/category" routerLinkActive="active" *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER']">Categories</a>
            <a class="ims-nav-link" routerLink="/analytics" routerLinkActive="active" *appHasRole="['ADMIN']">Analytics</a>
          </div>
        </div>
        
        <div class="ims-topnav-right">
          <!-- Global search trigger button -->
          <button class="ims-search-trigger">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span>Search...</span>
            <kbd>⌘K</kbd>
          </button>
          
          <!-- Bell alert -->
          <a routerLink="/stock-alerts" class="ims-nav-icon-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <div class="ims-notification-dot" *ngIf="activeAlertCount > 0"></div>
          </a>
          
          <!-- User menu dropdown -->
          <div class="ims-user-menu">
            <button class="ims-avatar-btn" (click)="userMenuOpen = !userMenuOpen">
              <div class="ims-avatar">{{ userInitial }}</div>
              <span class="ims-username">{{ userName }}</span>
            </button>
            <div class="ims-dropdown" *ngIf="userMenuOpen">
              <a routerLink="/profile">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
              </a>
              <button (click)="logOut()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" x2="9" y1="12" y2="12" /></svg>
                Sign out
              </button>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <!-- MOBILE DRAWER OVERLAY -->
    <div class="ims-drawer-overlay" *ngIf="mobileMenuOpen" (click)="mobileMenuOpen = false"></div>
    <aside class="ims-drawer" [class.open]="mobileMenuOpen">
      <div class="ims-drawer-logo">
        <span class="ims-logo-icon">⬡</span>
        <span class="ims-logo-text">IMS</span>
      </div>
      <a class="ims-nav-link" routerLink="/dashboard" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'STAFF', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER']">Dashboard</a>
      <a class="ims-nav-link" routerLink="/product" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER', 'STAFF']">Products</a>
      <a class="ims-nav-link" routerLink="/transaction" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'STAFF', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER']">Transactions</a>
      <div class="ims-nav-divider"></div>
      <a class="ims-nav-link" routerLink="/purchase-orders" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'PROCUREMENT_OFFICER', 'WAREHOUSE_MANAGER']">Orders</a>
      <a class="ims-nav-link" routerLink="/suppliers" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'PROCUREMENT_OFFICER']">Suppliers</a>
      <a class="ims-nav-link" routerLink="/category" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER']">Categories</a>
      <a class="ims-nav-link" routerLink="/analytics" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN']">Analytics</a>
      <div class="ims-nav-divider"></div>
      <a class="ims-nav-link" routerLink="/purchase" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER']">Receive Stock</a>
      <a class="ims-nav-link" routerLink="/sell" routerLinkActive="active" (click)="mobileMenuOpen = false" *appHasRole="['ADMIN', 'STAFF']">Sell</a>
    </aside>

    <!-- PAGE CONTENT -->
    <main class="ims-content" id="main-content">
      <router-outlet />
    </main>
  </div>
</ng-container>

<ng-template #authLayout>
  <router-outlet />
</ng-template>
