<ng-container *ngIf="shellVisible; else authLayout">
  <div class="ims-app-shell">
    <aside class="ims-sidebar">
      <div class="ims-sidebar-brand">
        <span class="ims-logo">IMS</span>
        <span class="ims-logo-tag">Inventory</span>
      </div>
      <nav class="ims-nav">
        <div class="ims-nav-section">OVERVIEW</div>
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }"
          *appHasRole="['ADMIN', 'STAFF', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <rect width="7" height="7" x="3" y="3" rx="1" />
            <rect width="7" height="7" x="14" y="3" rx="1" />
            <rect width="7" height="7" x="14" y="14" rx="1" />
            <rect width="7" height="7" x="3" y="14" rx="1" />
          </svg>
          <span>Dashboard</span>
        </a>
        <a routerLink="/transaction" routerLinkActive="active"
          *appHasRole="['ADMIN', 'STAFF', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <path d="m2 8 2 2 2-2" />
            <path d="m22 16-2-2-2 2" />
            <path d="M4 10h16" />
            <path d="M20 14H4" />
          </svg>
          <span>Transactions</span>
        </a>

        <div class="ims-nav-section">INVENTORY</div>
        <a routerLink="/stock-alerts" routerLinkActive="active" class="ims-nav-item"
          *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span>Stock Alerts</span>
          <span class="ims-badge" *ngIf="activeAlertCount > 0">{{ activeAlertCount }}</span>
        </a>
        <a routerLink="/product" routerLinkActive="active" class="ims-nav-item"
          *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER', 'PROCUREMENT_OFFICER', 'STAFF']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <path d="m7.5 4.27 9 5.15" />
            <path
              d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
            <path d="m3.3 7 8.7 5 8.7-5" />
            <path d="M12 22V12" />
          </svg>
          <span>Products</span>
          <span class="ims-badge" *ngIf="lowStockCount > 0">{{ lowStockCount }}</span>
        </a>
        <a routerLink="/category" routerLinkActive="active" *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <rect width="7" height="7" x="3" y="3" rx="1" />
            <rect width="7" height="7" x="3" y="14" rx="1" />
            <path d="M14 4h7" />
            <path d="M14 9h7" />
            <path d="M14 15h7" />
            <path d="M14 20h7" />
          </svg>
          <span>Category</span>
        </a>
        <a routerLink="/suppliers" routerLinkActive="active" *appHasRole="['ADMIN', 'PROCUREMENT_OFFICER']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="10" r="3" />
            <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662" />
          </svg>
          <span>Supplier</span>
        </a>

        <div class="ims-nav-section">OPERATIONS</div>
        <a routerLink="/purchase-orders" routerLinkActive="active" class="ims-nav-item"
          *appHasRole="['ADMIN', 'PROCUREMENT_OFFICER', 'WAREHOUSE_MANAGER']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <path d="M7 7h10" />
            <path d="M7 12h10" />
            <path d="M7 17h10" />
            <path d="M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z" />
          </svg>
          <span>Purchase Orders</span>
          <span class="ims-badge ims-badge-new">New</span>
        </a>
        <a routerLink="/purchase" routerLinkActive="active" *appHasRole="['ADMIN', 'WAREHOUSE_MANAGER']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v8" />
            <path d="M8 12h8" />
          </svg>
          <span>Receive Stock</span>
        </a>
        <a routerLink="/sell" routerLinkActive="active" *appHasRole="['ADMIN', 'STAFF']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="2" />
          </svg>
          <span>Sell</span>
        </a>

        <div class="ims-nav-section" *appHasRole="['ADMIN']">ANALYTICS</div>
        <a routerLink="/analytics" routerLinkActive="active" class="ims-nav-item" *appHasRole="['ADMIN']">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <path d="M3 3v18h18" />
            <path d="M7 14l3-3 4 4 6-6" />
          </svg>
          <span>Reports & Analytics</span>
          <span class="ims-badge ims-badge-new">NEW</span>
        </a>

        <div class="ims-nav-section">ACCOUNT</div>
        <a routerLink="/profile" routerLinkActive="active">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          <span>Profile</span>
        </a>
        <a (click)="logOut()" class="ims-nav-logout-link" style="cursor: pointer;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="ims-nav-icon">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" x2="9" y1="12" y2="12" />
          </svg>
          <span>Logout</span>
        </a>
      </nav>
      <div class="ims-sidebar-footer" style="display: none;">
        <!-- Hidden as we move logout to nav -->
      </div>
    </aside>
    <main class="ims-main">
      <div class="ims-topbar">
        <div class="ims-topbar-left">
          <!-- Main search functionality removed -->
        </div>
        <div class="ims-topbar-right">
          <a routerLink="/stock-alerts" class="ims-bell-link" aria-label="Stock alerts">
            <svg class="ims-bell-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            <span class="ims-badge ims-bell-badge" *ngIf="activeAlertCount > 0">{{ activeAlertCount }}</span>
          </a>
        </div>
      </div>
      <router-outlet />
    </main>
  </div>
</ng-container>

<ng-template #authLayout>
  <router-outlet />
</ng-template>
