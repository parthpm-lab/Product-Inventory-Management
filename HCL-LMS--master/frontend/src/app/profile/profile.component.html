<div class="ims-page profile-page" *ngIf="user">
  <p *ngIf="message" class="message">{{ message }}</p>

  <header class="ims-page-head">
    <div>
      <h1 class="ims-page-title">Profile</h1>
      <p class="ims-page-sub">Account details synced with the server</p>
    </div>
  </header>

  <div class="profile-layout">
    <section class="hero ims-card">
      <div class="hero-inner">
        <div class="avatar">{{ user.name?.charAt(0) || '?' }}</div>
        <div>
          <h2 class="hero-name">{{ user.name }}</h2>
          <p class="hero-email">{{ user.email }}</p>
          <span class="ims-pill ims-pill-ok role-pill">{{ user.role }}</span>
        </div>
      </div>
    </section>

    <section class="edit-panel ims-card">
      <h3 class="panel-title">Edit details</h3>
      <form (ngSubmit)="saveProfile()" class="stack-form">
        <div>
          <label class="ims-label">Name</label>
          <input
            class="ims-input"
            type="text"
            name="name"
            [(ngModel)]="editForm.name"
            required
          />
        </div>
        <div>
          <label class="ims-label">Email</label>
          <input
            class="ims-input"
            type="email"
            name="email"
            [(ngModel)]="editForm.email"
            required
          />
        </div>
        <div>
          <label class="ims-label">Phone</label>
          <input
            class="ims-input"
            type="text"
            name="phone"
            [(ngModel)]="editForm.phoneNumber"
            required
          />
        </div>
        <div>
          <label class="ims-label">New password</label>
          <input
            class="ims-input"
            type="password"
            name="pw"
            [(ngModel)]="editForm.password"
            placeholder="Leave blank to keep current"
            autocomplete="new-password"
          />
        </div>
        <button
          type="submit"
          class="ims-btn ims-btn-primary wide"
          [disabled]="saving"
        >
          {{ saving ? 'Saving…' : 'Save changes' }}
        </button>
      </form>
    </section>
  </div>
</div>
