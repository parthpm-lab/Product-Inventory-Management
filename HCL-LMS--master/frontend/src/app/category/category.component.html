<div class="ims-page cat-page">
  <p *ngIf="message" class="message">{{ message }}</p>

  <header class="ims-page-head">
    <div>
      <h1 class="ims-page-title">Categories</h1>
      <p class="ims-page-sub">
        Product mix per category — counts come from your inventory
      </p>
    </div>
  </header>

  <div class="cat-add ims-card">
    <h2 class="cat-section-title">
      {{ isEditing ? 'Edit category' : 'New category' }}
    </h2>
    <div class="cat-add-row">
      <input
        class="ims-input"
        type="text"
        [(ngModel)]="categoryName"
        placeholder="Category name"
        (keyup.enter)="isEditing ? editCategory() : addCategory()"
      />
      <button
        type="button"
        class="ims-btn ims-btn-primary"
        *ngIf="!isEditing"
        (click)="addCategory()"
      >
        Add
      </button>
      <button
        type="button"
        class="ims-btn ims-btn-primary"
        *ngIf="isEditing"
        (click)="editCategory()"
      >
        Save
      </button>
      <button
        type="button"
        class="ims-btn ims-btn-ghost"
        *ngIf="isEditing"
        (click)="cancelEdit()"
      >
        Cancel
      </button>
    </div>
  </div>

  <div class="cat-grid">
    <article
      class="cat-card ims-card"
      *ngFor="let category of categories; let i = index"
      [style.--delay.ms]="i * 40"
    >
      <div class="cat-icon" [attr.data-initial]="category.name.charAt(0)">
        {{ category.name.charAt(0) }}
      </div>
      <h3>{{ category.name }}</h3>
      <p class="cat-count">{{ category.productCount || 0 }} products</p>
      <div class="cat-progress">
        <div
          class="cat-progress-fill"
          [style.width.%]="barPercent(category)"
        ></div>
      </div>
      <div class="cat-actions">
        <button
          type="button"
          class="ims-btn ims-btn-ghost"
          (click)="handleEditCategory(category)"
        >
          Edit
        </button>
        <button
          type="button"
          class="ims-btn ims-btn-danger"
          (click)="handleDeleteCategory(category.id)"
        >
          Delete
        </button>
      </div>
    </article>
  </div>

  <p *ngIf="!categories.length && !message" class="empty-state ims-card">
    No categories yet. Create one to organize products.
  </p>
</div>
