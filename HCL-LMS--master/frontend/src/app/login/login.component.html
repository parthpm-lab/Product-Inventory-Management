<!-- Main container split into visual section and login panel -->
<div class="auth-split">
  <div class="auth-visual">
    <div class="auth-visual-inner">
      <span class="auth-logo">HCL-LMS</span>
      <h1>Inventory Management System</h1>
      <p>Sign in to track stock, streamline purchases, and monitor salecds analytics in a brand new enterprise experience.</p>
    </div>
  </div>
  <div class="auth-panel">
    <div class="auth-card">
      <h2 class="auth-title">Welcome back</h2>
      <p *ngIf="message" class="ims-toast ims-error">{{ message }}</p>
      
      <form (ngSubmit)="handleSubmit()" class="auth-form">
        <div class="form-floating">
          <input
            id="login-email"
            class="ims-input"
            type="email"
            placeholder=" "
            [(ngModel)]="formData.email"
            name="email"
            autocomplete="username"
            required
          />
          <label for="login-email">Email Address</label>
        </div>
        
        <div class="form-floating">
          <input
            id="login-pass"
            class="ims-input"
            type="password"
            placeholder=" "
            [(ngModel)]="formData.password"
            name="password"
            autocomplete="current-password"
            required
          />
          <label for="login-pass">Password</label>
        </div>
        
        <button type="submit" class="ims-btn ims-btn-primary auth-submit">Log In</button>
      </form>
      
      <p class="auth-footer">
        Don't have an account? <a routerLink="/register">Register here</a>
      </p>
    </div>
  </div>
</div>
